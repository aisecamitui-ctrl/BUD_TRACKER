<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker</title>
<meta name="theme-color" content="#3F51B5">
<link rel="manifest" href="manifest.json">

<style>
/* Base */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; }
body { background:#f4f6fa; display:flex; justify-content:center; padding:50px 10px; }

/* Container */
.container { width:440px; max-width:95%; background:#fff; border-radius:20px; padding:25px; box-shadow:0 12px 30px rgba(0,0,0,0.08); }

/* Header */
h2 { text-align:center; color:#3F51B5; margin-bottom:30px; font-weight:700; font-size:28px; }

/* Balance/Spent cards */
.balance-today { display:flex; gap:15px; margin-bottom:25px; }
.balance, .today { flex:1; padding:20px; border-radius:15px; text-align:center; font-weight:600; font-size:18px; color:#fff; }
.balance { background:#3F51B5; }
.today { background:#FFC107; color:#333; }

/* Summary cards */
.summary { display:flex; gap:12px; margin-bottom:25px; }
.box { flex:1; padding:15px; border-radius:12px; text-align:center; font-weight:500; color:#fff; cursor:pointer; transition:transform 0.2s; }
.box:hover { transform:translateY(-3px); }
.income { background:#4CAF50; }
.expense { background:#F44336; }
.allowance { background:#2196F3; }

/* Form with floating labels */
.form { display:flex; flex-direction:column; gap:12px; margin-bottom:25px; }
.form input, .form select { width:100%; padding:14px 18px; border-radius:12px; border:1px solid #ccc; font-size:15px; transition:border 0.2s; }
.form input:focus, .form select:focus { outline:none; border-color:#3F51B5; }
.form button { width:100%; padding:16px; border:none; border-radius:12px; background:#3F51B5; color:#fff; font-weight:600; font-size:16px; cursor:pointer; transition:transform 0.1s; }
.form button:hover { transform:translateY(-2px); background:#303f9f; }

/* Transactions */
ul { list-style:none; max-height:350px; overflow-y:auto; padding:0; }
.transaction { display:flex; justify-content:space-between; align-items:center; background:#fafafa; padding:14px; border-radius:12px; margin-bottom:8px; box-shadow:0 2px 6px rgba(0,0,0,0.03); }
.trans-left { display:flex; flex-direction:column; }
.trans-title { font-weight:500; font-size:15px; color:#333; }
.trans-type { font-size:12px; margin-top:3px; font-weight:600; padding:2px 6px; border-radius:6px; color:#fff; width:max-content; }
.trans-date { font-size:11px; color:#777; margin-top:2px; }
.trans-income { background:#4CAF50; }
.trans-expense { background:#F44336; }
.trans-allowance { background:#2196F3; }
.delete { color:#f44336; cursor:pointer; font-weight:bold; font-size:16px; }

/* Toast */
.toast { position:absolute; top:10px; left:50%; transform:translateX(-50%) translateY(-20px); background:#3F51B5; color:white; padding:18px 25px; border-radius:15px; opacity:0; pointer-events:none; transition:all 0.4s ease; font-weight:600; font-size:18px; text-align:center; z-index:100; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>

<body>
<div class="container">
<h2>Budget Tracker</h2>

<div class="balance-today">
    <div class="balance">Balance<br>₱<span id="balance">0</span></div>
    <div class="today">Spent Today<br>₱<span id="today">0</span></div>
</div>

<div class="summary">
    <div class="box income">Income<br>₱<span id="income">0</span></div>
    <div class="box expense">Expense<br>₱<span id="expense">0</span></div>
    <div class="box allowance">Allowance<br>₱<span id="allowance">0</span></div>
</div>

<div class="form">
    <input id="text" placeholder="Description">
    <input id="amount" type="number" placeholder="Amount">
    <select id="type">
        <option value="expense">Expense</option>
        <option value="income">Income</option>
        <option value="allowance">Allowance</option>
    </select>
    <button onclick="addTransaction()">Add Transaction</button>
</div>

<ul id="list"></ul>
<div id="toast" class="toast"></div>
</div>

<script>
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

function save(){ localStorage.setItem("transactions", JSON.stringify(transactions)); }

function showToast(message,color){
    const toast = document.getElementById("toast");
    toast.innerText = message;
    toast.style.background = color;
    toast.classList.add("show");
    setTimeout(()=>{ toast.classList.remove("show"); },3000);
}

function addTransaction(){
    let text = document.getElementById("text").value;
    let amount = document.getElementById("amount").value;
    let type = document.getElementById("type").value;
    if(text==="" || amount===""){ alert("Please fill all fields"); return; }

    let transaction = { id:Date.now(), text:text, amount:Number(amount), type:type, date:new Date().toLocaleDateString() };
    transactions.push(transaction);
    document.getElementById("text").value=""; document.getElementById("amount").value="";
    save(); updateUI();

    if(type==="expense"){ if(Number(amount)>500) showToast("Big Expense Added!","#f44336"); }
    else { showToast(type==="allowance"?"Allowance Added!":"Income Added!","#4caf50"); }
}

function updateUI(){
    let list = document.getElementById("list"); list.innerHTML="";
    let income=0, expense=0, allowance=0, todayTotal=0;
    const today = new Date().toLocaleDateString();

    [...transactions].reverse().forEach(t=>{
        let typeClass="";
        if(t.type==="income"){ income+=t.amount; typeClass="trans-income"; }
        else if(t.type==="expense"){ expense+=t.amount; typeClass="trans-expense"; if(t.date===today) todayTotal+=t.amount; }
        else { allowance+=t.amount; typeClass="trans-allowance"; }

        const li = document.createElement("li");
        li.className="transaction";
        li.innerHTML=`<div class="trans-left">
            <div class="trans-title">${t.text} - ₱${t.amount}</div>
            <div class="trans-type ${typeClass}">${t.type.charAt(0).toUpperCase()+t.type.slice(1)}</div>
            <div class="trans-date">${t.date}</div>
        </div>
        <span class="delete" onclick="deleteTransaction(${t.id})">x</span>`;
        list.appendChild(li);
    });

    document.getElementById("income").innerText = income;
    document.getElementById("expense").innerText = expense;
    document.getElementById("allowance").innerText = allowance;
    document.getElementById("balance").innerText = income + allowance - expense;
    document.getElementById("today").innerText = todayTotal;
}

function deleteTransaction(id){ transactions = transactions.filter(t=>t.id!==id); save(); updateUI(); }
updateUI();
</script>
</body>
</html>
